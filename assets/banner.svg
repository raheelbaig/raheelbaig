<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D1FF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>

    <!-- Dark Mode Support -->
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0A0F1F; }
        .text { fill: #00D1FF; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #F7FAFC; }
        .text { fill: #0055CC; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" class="bg"/>
  
  <!-- Glow Line -->
  <rect y="198" width="1200" height="2" fill="url(#grad)" />

  <!-- Title -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
        class="text" font-size="38" font-family="Segoe UI, Roboto, sans-serif"
        style="letter-spacing: 1px; font-weight: 600;">
    RAHEEL BAIG — Software Engineer
  </text>
</svg>
