
<svg width="100%" height="140" viewBox="0 0 1200 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D1FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>

    <style>
      @media (prefers-color-scheme: dark) {
        .wave { opacity: 0.7; }
      }
      @media (prefers-color-scheme: light) {
        .wave { opacity: 0.5; }
      }
    </style>
  </defs>

  <!-- Wave 1 -->
  <path class="wave" fill="url(#waveGrad)">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
    values="
      M0,60 C300,120 900,0 1200,60 L1200,150 L0,150 Z;
      M0,80 C300,20 900,140 1200,80 L1200,150 L0,150 Z;
      M0,60 C300,120 900,0 1200,60 L1200,150 L0,150 Z
    " />
  </path>

  <!-- Wave 2 -->
  <path class="wave" fill="url(#waveGrad)" opacity="0.5">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
    values="
      M0,70 C500,0 700,140 1200,70 L1200,150 L0,150 Z;
      M0,90 C500,140 700,0 1200,90 L1200,150 L0,150 Z;
      M0,70 C500,0 700,140 1200,70 L1200,150 L0,150 Z
    " />
  </path>
</svg>
